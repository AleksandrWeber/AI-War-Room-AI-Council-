services:
  postgres:
    image: postgres:17-alpine
    container_name: ai-war-room-postgres
    environment:
      POSTGRES_DB: ai_war_room
      POSTGRES_USER: ai_war_room
      POSTGRES_PASSWORD: ai_war_room
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ai_war_room -d ai_war_room']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-war-room-redis
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
